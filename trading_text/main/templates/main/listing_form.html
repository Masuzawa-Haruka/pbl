{% extends 'main/base.html' %}
{% load static %}

{% block title %}出品 | OU Textbook{% endblock %}
{% block extra_style %}
<link rel="stylesheet" href="{% static 'main/css/listing_form.css' %}">
{% endblock %}
{% block header_title %}教科書を出品する{% endblock %}

{% block content %}
<section class="listing-page" aria-label="出品画面">
  <form class="listing-form" action="{% url 'listing_form' %}" method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <label>
      <span>書名</span>
      {{ form.title }}
      {{ form.title.errors }}
    </label>

    <label>
      <span>著者</span>
      {{ form.author }}
      {{ form.author.errors }}
    </label>

    <label>
      <span>価格</span>
      <div class="price-row">{{ form.price }}<strong>円</strong></div>
      {{ form.price.errors }}
    </label>

    <label>
      <span>カテゴリ</span>
      {{ form.category }}
      {{ form.category.errors }}
    </label>

    <label>
      <span>状態</span>
      {{ form.condition }}
      {{ form.condition.errors }}
    </label>

    <label>
      <span>キャンパス</span>
      {{ form.campus }}
      {{ form.campus.errors }}
    </label>

    <label>
      <span>説明（任意）</span>
      {{ form.description }}
      {{ form.description.errors }}
    </label>

    <button class="primary-button" type="submit">出品する</button>
  </form>
</section>
{% endblock %}
