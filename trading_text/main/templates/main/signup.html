{% extends 'main/login.html' %}

{% block title %}新規登録 | OU Textbook{% endblock %}

{% block content %}
<section class="login-page md:grid md:min-h-screen md:place-items-center md:px-8 md:py-12">
  <div class="login-card md:max-w-[560px] md:rounded-lg md:border md:border-ou-line md:bg-white md:px-12 md:py-10 md:shadow-sm">
    <h1 class="login-logo">OU Textbook</h1>
    <div class="login-subtitle-container">
      <p class="login-subtitle">大阪大学メールで新規登録</p>
      <p class="login-subtitle">新規登録</p>
    </div>

    <form class="login-form" method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label class="login-field">
        <span>名前</span>
        <input type="text" name="display_name" value="{{ form.display_name.value|default:'' }}" maxlength="80" autocomplete="name" required>
        {{ form.display_name.errors }}
      </label>
      <label class="login-field">
        <span>メールアドレス</span>
        <input type="email" name="email" value="{{ form.email.value|default:'' }}" placeholder="name@ecs.osaka-u.ac.jp" required>
        {{ form.email.errors }}
      </label>
      <label class="login-field">
        <span>パスワード</span>
        <input type="password" name="password1" required>
        {{ form.password1.errors }}
      </label>
      <label class="login-field">
        <span>パスワード確認</span>
        <input type="password" name="password2" required>
        {{ form.password2.errors }}
      </label>
      <div class="signup-policy-consent">
        <label class="signup-policy-consent__label">
          <input type="checkbox" name="agree_to_policies" required{% if form.agree_to_policies.value %} checked{% endif %}>
          <span>
            <a href="{% url 'terms' %}" target="_blank" rel="noopener">利用規約</a>と
            <a href="{% url 'privacy_policy' %}" target="_blank" rel="noopener">プライバシーポリシー</a>に同意します
          </span>
        </label>
        {{ form.agree_to_policies.errors }}
      </div>
      <button class="login-button login-button--submit" type="submit">
        <span class="login-button__text">認証メールを送信</span>
      </button>
    </form>

    <hr class="login-divider">
    <a class="login-signup-guide__link" href="{% url 'login' %}">ログインに戻る</a>
  </div>
</section>
{% endblock %}
