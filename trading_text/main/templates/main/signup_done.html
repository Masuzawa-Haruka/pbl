{% extends 'main/login.html' %}

{% block title %}認証メール送信 | OU Textbook{% endblock %}

{% block content %}
<section class="login-page">
  <div class="login-card">
    <h1 class="login-logo">OU Textbook</h1>
    <p class="login-subtitle">{{ email }} に認証メールを送信しました。</p>
    <p class="login-target">Supabase Auth から届く確認メールを開いて登録を完了してください。</p>
    <hr class="login-divider">
    <a class="login-signup-guide__link" href="{% url 'login' %}">ログインに戻る</a>
  </div>
</section>
{% endblock %}
