{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading Text{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <h1>Trading Text</h1>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Trading Text</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
